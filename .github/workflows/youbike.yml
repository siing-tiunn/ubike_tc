name: YouBike Pipeline

on:
  schedule:
    - cron: '*/20 * * * *'  # 每20分鐘執行一次
  workflow_dispatch:         # 也可以手動觸發

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 17 for SQL Server
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Add GitHub Actions IP to Azure SQL Firewall  # ← 新增
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az sql server firewall-rule create \
            --resource-group data_analystic \
            --server siit \
            --name github-actions-runner \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP
          echo "Waiting for firewall rule to propagate..."
          sleep 10

      - name: Run YouBike pipeline
        run: python src/pipeline.py
        env:
          DBSERVER: ${{ secrets.DBSERVER }}
          DBUSER: ${{ secrets.DBUSER }}
          DBPWD: ${{ secrets.DBPWD }}
          DATABASE: ${{ secrets.DATABASE }}

      - name: Remove GitHub Actions IP from Firewall  # ← 執行完移除
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group data_analystic \
            --server siit \
            --name github-actions-runner